monitor=eDP-1,preferred,auto,1
monitor=,preferred,auto,1,mirror,eDP-1

exec-once=$HOME/.config/hypr/autostart
exec-once=hyprpaper

env = HYPRCURSOR_THEME,macOS-hypr
env = HYPRCURSOR_SIZE,24

input {
    sensitivity=0 # for mouse cursor    
    kb_layout=
    kb_variant=ffffff
    kb_model=
    kb_options=
    kb_rules=

    follow_mouse=1

    touchpad {
        natural_scroll=yes
    }
}

misc{
    
}

general {
    gaps_in=8
    gaps_out=15
    border_size=3
    col.active_border=rgba(cba6f7ff) rgba(89b4faff) rgba(94e2d5ff) 10deg
    col.inactive_border=0xff45475a
}

group {
    col.border_inactive=0xff89dceb
    col.border_active=0xfff9e2af
}

decoration {
    shadow {
        enabled=true
	range=100
	render_power=5
        color= 0x33000000
        color_inactive=0x22000000
    }
    rounding=15
}



animations {
    enabled=1
    # bezier=overshot,0.05,0.9,0.1,1.1
    bezier=overshot,0.13,0.99,0.29,1.1
    animation=windows,1,4,overshot,slide
    animation=border,1,10,default
    animation=fade,1,10,default
    animation=workspaces,1,5,default,slide
}

dwindle {
    pseudotile=1 # enable pseudotiling on dwindle
    force_split=0
}

master{
    
}

gestures {
    #workspace_swipe=yes
    #workspace_swipe_fingers=4
}

# example window rules
# for windows named/classed as abc and xyz
#windowrule=move 69 420,abc
windowrule {
  name = windowrule-1
  move = (center)
  size = 800 500
  float = on
  match:title = ^(fly_is_kitty)$
}

windowrule {
  name = windowrule-2
  animation = slide
  float = on
  match:title = ^(all_is_kitty)$
}

#windowrule=tile,xy
windowrule {
  name = windowrule-3
  tile = on
  match:title = ^(kitty)$
}

windowrule {
  name = windowrule-4
  float = on
  size = 361 237
  match:title = ^(clock_is_kitty)$
}

#windowrule=pseudo,abc
#windowrule=monitor 0,xyz

# example binds
bindm=SUPER,mouse:272,movewindow
bindm=SUPER,mouse:273,resizewindow

bind=SUPER,t,exec,kitty --start-as=fullscreen --title all_is_kitty
bind=SUPER,RETURN,exec,kitty --title fly_is_kitty
bind=ALT,RETURN,exec,kitty --single-instance
bind=Super shift,S,exec,~/.config/hypr/scripts/screenshot
bind=SUPER,Q,killactive,
bind=SUPER,M,exit,
bind=SUPER,E,exec,nemo
bind=SUPER,S,togglefloating,
bind=SUPER,D,exec,wofi --show drun -o DP-3
bind=SUPER,P,pseudo,
bind=SUPER,F,fullscreen,
bind=SUPER shift,L,exec,~/.config/hypr/scripts/lock
bind=SUPER,V,exec,cliphist list | wofi -S dmenu | cliphist decode | wl-copy
bind=SUPER,period,exec,wofi-emoji

bind=SUPER,H,movefocus,l
bind=SUPER,L,movefocus,r
bind=SUPER,J,movefocus,u
bind=SUPER,K,movefocus,d

# bind=CTRL,1,workspace,1
# bind=CTRL,2,workspace,2
# bind=CTRL,3,workspace,3
# bind=CTRL,4,workspace,4
# bind=CTRL,5,workspace,5
# bind=CTRL,6,workspace,6
bind=SUPER,1,workspace,1
bind=SUPER,2,workspace,2
bind=SUPER,3,workspace,3
bind=SUPER,4,workspace,4
bind=SUPER,5,workspace,5
bind=SUPER,6,workspace,6
bind=SUPER,7,workspace,7
bind=SUPER,8,workspace,8
bind=SUPER,9,workspace,9
bind=SUPER,0,workspace,10

bind=ALT,1,movetoworkspace,1
bind=ALT,2,movetoworkspace,2
bind=ALT,3,movetoworkspace,3
bind=ALT,4,movetoworkspace,4
bind=ALT,5,movetoworkspace,5
bind=ALT,6,movetoworkspace,6
bind=ALT,7,movetoworkspace,7
bind=ALT,8,movetoworkspace,8
bind=ALT,9,movetoworkspace,9
bind=ALT,0,movetoworkspace,10

bind=SUPER,mouse_down,workspace,e+1
bind=SUPER,mouse_up,workspace,e-1

bind=SUPER,g,togglegroup
bind=SUPER,tab,changegroupactive

# rec
bind=CTRL,1,exec,kitty --title fly_is_kitty --hold cava
bind=CTRL,2,exec,code
bind=CTRL,3,exec,kitty --single-instance --hold donut.c
bind=CTRL,4,exec,kitty --title clock_is_kitty --hold tty-clock -C5
